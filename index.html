<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고스톱 정산기 Smart Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#1e3c72,#2a5298); margin:0; padding:10px; color:white; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background:white; color:#333; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .nameInput { width: 20%; padding:8px; margin:2px; border-radius:8px; border:1px solid #ddd; text-align:center; font-weight: bold; }
        
        .player-row { border-bottom: 1px solid #eee; padding: 12px 0; }
        .player-row:last-child { border: none; }
        .row-main { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        
        .role-radio { transform: scale(1.3); cursor: pointer; margin-right: 5px; }
        .player-name-label { width: 70px; font-weight: bold; font-size: 15px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .score-input-container { flex: 1; display: flex; align-items: center; gap: 5px; }
        .score-input { width: 100%; max-width: 120px; padding: 8px; border-radius: 8px; border: 2px solid #28a745; text-align: center; font-size: 16px; font-weight: bold; }
        .score-input:disabled { border-color: #eee; background: #f9f9f9; color: transparent; }
        .win-unit { font-weight: bold; color: #28a745; display: none; }

        .row-options { display: flex; flex-wrap: wrap; gap: 5px; padding-left: 30px; margin-top: 5px; }
        .opt-btn { font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .opt-btn.active { background: #ff4d4d; color: white; border-color: #ff4d4d; }
        .opt-btn.exclude { border-color: #6c757d; color: #6c757d; }
        .opt-btn.exclude.active { background: #6c757d; color: white; }

        .mainBtn { width:100%; padding:14px; margin-top:10px; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor: pointer; }
        .addBtn { background:#28a745; color:white; }
        .undoBtn { background:#ffc107; margin-top: 10px; }
        .resetBtn { background:#dc3545; color:white; margin-top: 20px; }
        
        #result { white-space:pre-line; font-weight:bold; color: #2a5298; line-height: 1.6; border-top: 1px solid #eee; padding-top: 10px; font-size: 15px; }
        #ranking { line-height: 1.7; margin-bottom: 10px; }
        .winner-tag { background:#ffe066; padding:2px 6px; border-radius:4px; font-weight:bold; color: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center;">🎴 스마트 고스톱 정산</h2>

    <div class="card">
        <b>👤 이름 설정</b><br><br>
        <input class="nameInput" id="name0" value="A" oninput="updatePlayerNames()">
        <input class="nameInput" id="name1" value="B" oninput="updatePlayerNames()">
        <input class="nameInput" id="name2" value="C" oninput="updatePlayerNames()">
        <input class="nameInput" id="name3" value="D" oninput="updatePlayerNames()">
    </div>

    <div class="card">
        <b>📝 판 결과 입력 (승자 선택)</b><br><br>
        <div id="playerRows"></div>
        <button class="mainBtn addBtn" onclick="addRound()">판 저장</button>
        <button class="mainBtn undoBtn" onclick="undoLast()">↩ 마지막 기록 취소</button>
    </div>

    <div class="card">
        <b>🏆 누적 순위 및 정산</b>
        <div id="ranking"></div>
        <div id="result">정산 내역 없음</div>
    </div>

    <button class="mainBtn resetBtn" onclick="resetGame()">전체 초기화</button>
</div>

<script>
    let rounds = []; 
    let currentWinnerIdx = 0;
    let excluded = [false, false, false, false]; 

    window.onload = () => { initUI(); loadGame(); };

    function initUI() {
        const container = document.getElementById('playerRows');
        container.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            container.innerHTML += `
                <div class="player-row" id="row${i}">
                    <div class="row-main">
                        <input type="radio" name="winner" class="role-radio" id="winRadio${i}" ${i==0?'checked':''} onclick="setWinner(${i})">
                        <span class="player-name-label" id="labelName${i}"></span>
                        <div class="score-input-container">
                            <input type="number" id="winScore${i}" class="score-input" placeholder="점수 입력" ${i!==0?'disabled':''} onfocus="this.select()">
                            <span class="win-unit" id="unit${i}">점 승!</span>
                        </div>
                    </div>
                    <div class="row-options" id="opts${i}">
                        <button class="opt-btn exclude" id="btn_ex_${i}" onclick="toggleExclude(${i})">광(휴식)</button>
                        <button class="opt-btn pak" id="btn_p_${i}" onclick="togglePak(this)">피박(x2)</button>
                        <button class="opt-btn pak" id="btn_g_${i}" onclick="togglePak(this)">광박(x2)</button>
                        <button class="opt-btn pak" id="btn_m_${i}" onclick="togglePak(this)">멍박(x2)</button>
                        <button class="opt-btn pak" id="btn_3g_${i}" onclick="togglePak(this)">흔듦/고(x2)</button>
                    </div>
                </div>`;
        }
        updatePlayerNames();
    }

    // 이름 입력 시 실시간으로 입력창 옆 이름 업데이트
    function updatePlayerNames() {
        for (let i = 0; i < 4; i++) {
            const name = document.getElementById(`name${i}`).value || (i+1);
            document.getElementById(`labelName${i}`).innerText = name;
        }
        setWinner(currentWinnerIdx); // UI 상태 다시 적용
    }

    function setWinner(idx) {
        currentWinnerIdx = idx;
        for (let i = 0; i < 4; i++) {
            const isWinner = (i === idx);
            document.getElementById(`winScore${i}`).disabled = !isWinner;
            document.getElementById(`unit${i}`).style.display = isWinner ? 'inline' : 'none';
            document.getElementById(`opts${i}`).style.display = isWinner ? 'none' : 'flex';
            
            if (!isWinner) {
                document.getElementById(`winScore${i}`).value = '';
            }
        }
    }

    function toggleExclude(idx) {
        excluded[idx] = !excluded[idx];
        const btn = document.getElementById(`btn_ex_${idx}`);
        btn.classList.toggle('active', excluded[idx]);
        
        // 광파는 사람은 다른 '박' 옵션 비활성화 효과
        const pakBtns = document.querySelectorAll(`#opts${idx} .pak`);
        pakBtns.forEach(b => {
            b.style.opacity = excluded[idx] ? '0.3' : '1';
            b.disabled = excluded[idx];
            if(excluded[idx]) b.classList.remove('active');
        });
    }

    function togglePak(btn) {
        btn.classList.toggle('active');
    }

    function addRound() {
        const winScore = parseInt(document.getElementById(`winScore${currentWinnerIdx}`).value) || 0;
        if (winScore <= 0) { alert("승리한 사람의 점수를 입력해주세요."); return; }

        let scores = [0, 0, 0, 0];
        let totalLost = 0;

        for (let i = 0; i < 4; i++) {
            if (i === currentWinnerIdx || excluded[i]) {
                scores[i] = 0;
            } else {
                // 활성화된 '박' 버튼 개수만큼 2배씩 곱함
                let multiplier = 1;
                const activePaks = document.querySelectorAll(`#opts${i} .pak.active`);
                activePaks.forEach(() => { multiplier *= 2; });
                
                scores[i] = -(winScore * multiplier);
                totalLost += Math.abs(scores[i]);
            }
        }
        scores[currentWinnerIdx] = totalLost;

        rounds.push({ scores, excluded: [...excluded] });
        
        // 입력 초기화
        document.getElementById(`winScore${currentWinnerIdx}`).value = '';
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        excluded = [false, false, false, false];
        
        calculate();
        saveGame();
        setWinner(currentWinnerIdx); // UI 리셋
    }

    function saveGame() { localStorage.setItem("gostop_smart_v5", JSON.stringify(rounds)); }
    function loadGame() {
        let data = localStorage.getItem("gostop_smart_v5");
        if (data) { rounds = JSON.parse(data); calculate(); }
    }

    function calculate() {
        let names = [0,1,2,3].map(i => document.getElementById(`name${i}`).value || (i+1));
        let total = [0,0,0,0];
        let pairDebts = Array.from(Array(4), () => Array(4).fill(0));

        rounds.forEach(r => {
            for(let i=0; i<4; i++) total[i] += r.scores[i];
            for (let i=0; i<4; i++) {
                for (let j=i+1; j<4; j++) {
                    if (r.excluded[i] || r.excluded[j]) continue;
                    let diff = r.scores[i] - r.scores[j];
                    if (diff > 0) pairDebts[j][i] += diff;
                    else if (diff < 0) pairDebts[i][j] += Math.abs(diff);
                }
            }
        });

        // 순위 표시
        let sorted = names.map((n, i) => ({ name: n, score: total[i] })).sort((a, b) => b.score - a.score);
        document.getElementById("ranking").innerHTML = sorted.map((p, i) => 
            `${i+1}등: <span class="${i==0 && p.score>0 ? 'winner-tag' : ''}">${p.name} (${p.score.toLocaleString()})</span>`
        ).join("<br>");

        // 정산 결과
        let results = [];
        for (let i=0; i<4; i++) {
            for (let j=i+1; j<4; j++) {
                let net = pairDebts[i][j] - pairDebts[j][i];
                if (net > 0) results.push(`${names[i]} ⮕ ${names[j]} : ${net.toLocaleString()}점`);
                else if (net < 0) results.push(`${names[j]} ⮕ ${names[i]} : ${Math.abs(net).
