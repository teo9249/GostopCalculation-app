<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고스톱 정산기</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e3c72">

<style>
body{
  font-family:sans-serif;
  margin:0;
  padding:20px;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
}
h1{text-align:center;}
.card{
  background:white;
  color:black;
  padding:15px;
  border-radius:16px;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:10px;
  margin:5px 0;
  font-size:16px;
}
button{
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
.primary{background:#4CAF50;color:white;}
.danger{background:#ff4d4d;color:white;}
.install{background:#ffcc00;width:100%;}
.scoreRow{
  display:flex;
  gap:5px;
}
.scoreRow input{flex:1;}
.minusBtn{
  width:40px;
  background:#555;
  color:white;
}
.winner{
  background:#ffd700 !important;
}
#progressBar{
  height:6px;
  width:0%;
  background:#ff4d4d;
  border-radius:6px;
}
</style>
</head>
<body>

<h1>🎴 고스톱 정산기</h1>

<div class="card">
<h3>📖 사용 방법</h3>
✔ 승자는 가져갈 <b>총 점수</b> 입력<br>
✔ 패자는 <b>- 버튼</b> 눌러 음수로 잃은 점수 입력<br>
✔ 한 판 합계는 반드시 <b>0</b> 이어야 함<br>
✔ 합계가 0이 아니면 판 추가 안 됨
</div>

<div id="iosGuide" class="card" style="display:none;">
📱 아이폰은 Safari → 공유 버튼 → "홈 화면에 추가"
</div>

<button id="installBtn" class="install" style="display:none;">
📲 앱 설치하기
</button>

<div class="card">
<h3>플레이어 이름</h3>
<input id="name1" placeholder="플레이어1">
<input id="name2" placeholder="플레이어2">
<input id="name3" placeholder="플레이어3">
<input id="name4" placeholder="플레이어4">
</div>

<div class="card">
<h3>점수 입력</h3>
<div id="scoreInputs"></div>
<button class="primary" onclick="addRound()">판 추가</button>
<button onclick="undoLast()">↩ 마지막 판 되돌리기</button>
</div>

<div class="card">
<h3>현재 총점</h3>
<div id="totals"></div>
</div>

<div class="card">
<h3>판 기록</h3>
<div id="history"></div>
</div>

<div class="card">
<button id="resetBtn" class="danger" style="width:100%;user-select:none;touch-action:none;">
⚠ 전체 초기화 (3초 길게 누르기)
</button>
<div style="background:#ddd;border-radius:6px;margin-top:8px;">
<div id="progressBar"></div>
</div>
</div>

<script>
let players=["","","",""];
let totals=[0,0,0,0];
let history=[];
let deferredPrompt;

const scoreInputs=document.getElementById("scoreInputs");

function renderScoreInputs(){
  scoreInputs.innerHTML="";
  for(let i=0;i<4;i++){
    let row=document.createElement("div");
    row.className="scoreRow";
    row.innerHTML=`
      <input type="text" inputmode="numeric" pattern="-?[0-9]*" id="score${i}" placeholder="0">
      <button class="minusBtn" onclick="toggleMinus(${i})">-</button>
    `;
    scoreInputs.appendChild(row);
  }
}
renderScoreInputs();

function toggleMinus(i){
  let input=document.getElementById("score"+i);
  if(input.value.startsWith("-")){
    input.value=input.value.replace("-","");
  }else{
    input.value="-"+input.value;
  }
}

function addRound(){
  players=[
    name1.value||"P1",
    name2.value||"P2",
    name3.value||"P3",
    name4.value||"P4"
  ];
  let round=[];
  let sum=0;
  for(let i=0;i<4;i++){
    let val=parseInt(document.getElementById("score"+i).value)||0;
    round.push(val);
    sum+=val;
  }
  if(sum!==0){
    alert("한 판 합계는 0이어야 합니다!");
    return;
  }
  history.push(round);
  for(let i=0;i<4;i++){
    totals[i]+=round[i];
  }
  saveData();
  render();
  renderHistory();
}

function render(){
  let html="";
  let max=Math.max(...totals);
  for(let i=0;i<4;i++){
    html+=`<div class="${totals[i]===max?'winner':''}">
      ${players[i]} : ${totals[i]}
    </div>`;
  }
  document.getElementById("totals").innerHTML=html;
}

function renderHistory(){
  let html="";
  history.forEach((r,idx)=>{
    html+=`<div>${idx+1}판 : ${r.join(", ")}</div>`;
  });
  document.getElementById("history").innerHTML=html;
}

function undoLast(){
  if(history.length===0)return;
  let last=history.pop();
  for(let i=0;i<4;i++){
    totals[i]-=last[i];
  }
  saveData();
  render();
  renderHistory();
}

function saveData(){
  localStorage.setItem("gostopData",JSON.stringify({
    players,totals,history
  }));
}

function loadData(){
  let data=localStorage.getItem("gostopData");
  if(!data)return;
  let parsed=JSON.parse(data);
  players=parsed.players;
  totals=parsed.totals;
  history=parsed.history;
  name1.value=players[0];
  name2.value=players[1];
  name3.value=players[2];
  name4.value=players[3];
  render();
  renderHistory();
}
loadData();

/* ====== 안정형 3초 길게 초기화 ====== */

const resetBtn=document.getElementById("resetBtn");
const progressBar=document.getElementById("progressBar");

let pressTimer=null;
let progress=0;

function startPress(e){
  e.preventDefault();
  progress=0;
  progressBar.style.width="0%";

  pressTimer=setInterval(()=>{
    progress+=2;
    progressBar.style.width=progress+"%";

    if(progress>=100){
      clearInterval(pressTimer);
      if(confirm("정말 전체 초기화 하시겠습니까?")){
        localStorage.clear();
        location.reload();
      }else{
        progressBar.style.width="0%";
      }
    }
  },60);
}

function cancelPress(){
  clearInterval(pressTimer);
  progressBar.style.width="0%";
}

resetBtn.addEventListener("pointerdown",startPress);
resetBtn.addEventListener("pointerup",cancelPress);
resetBtn.addEventListener("pointerleave",cancelPress);
resetBtn.addEventListener("pointercancel",cancelPress);

/* ====== PWA ====== */

if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}

window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  installBtn.style.display="block";
});

installBtn.addEventListener("click",async()=>{
  installBtn.style.display="none";
  deferredPrompt.prompt();
  deferredPrompt=null;
});

if(/iPhone|iPad|iPod/i.test(navigator.userAgent)){
  document.getElementById("iosGuide").style.display="block";
}
</script>

</body>
</html>
