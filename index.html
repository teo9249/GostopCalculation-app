<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고스톱 정산기 Lite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg,#1e3c72,#2a5298); margin:0; padding:20px; color:white; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        .card { background:white; color:#333; padding:18px; border-radius:15px; margin-bottom:20px; box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .nameInput { width: 20%; padding:8px; margin:2px; border-radius:8px; border:1px solid #ddd; text-align:center; font-weight: bold; }
        .scoreRow { display:flex; justify-content: space-between; align-items: center; margin-bottom:12px; }
        .scoreRow input[type="number"] { flex: 1; padding:10px; margin: 0 10px; border-radius:8px; border:1px solid #ccc; text-align:center; font-size: 18px; font-weight: bold; }
        .exclude-label { font-size: 12px; color: #ff4d4d; font-weight: bold; display: flex; flex-direction: column; align-items: center; cursor: pointer; width: 40px; }
        .minusBtn { background:#ff4d4d; color:white; border:none; border-radius:8px; padding:10px 12px; font-weight:bold; cursor: pointer; }
        
        .mainBtn { width:100%; padding:14px; margin-top:10px; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor: pointer; }
        .addBtn { background:#28a745; color:white; }
        .undoBtn { background:#ffc107; margin-top: 15px; }
        .resetBtn { background:#dc3545; color:white; margin-top: 20px; }
        
        #result { white-space:pre-line; font-weight:bold; color: #2a5298; line-height: 1.8; border-top: 1px solid #eee; padding-top: 10px; }
        #ranking { line-height: 1.6; margin-bottom: 10px; }
        .winner { background:#ffe066; padding:2px 5px; border-radius:4px; font-weight:bold; }
        .copyBtn { background: #6c757d; color: white; font-size: 12px; padding: 5px 10px; border-radius: 5px; float: right; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎴 고스톱 정산기</h2>

    <div class="card">
        <b>👤 플레이어 이름</b><br><br>
        <input class="nameInput" id="nameA" value="A" oninput="calculate()">
        <input class="nameInput" id="nameB" value="B" oninput="calculate()">
        <input class="nameInput" id="nameC" value="C" oninput="calculate()">
        <input class="nameInput" id="nameD" value="D" oninput="calculate()">
    </div>

    <div class="card">
        <b>📝 점수 입력 (광파는 사람 체크)</b><br><br>
        <div class="scoreRow">
            <label class="exclude-label"><input type="checkbox" id="exA">광</label>
            <input type="number" id="scoreA" placeholder="0" onfocus="this.select()">
            <button class="minusBtn" onclick="addMinus('scoreA')">+/-</button>
        </div>
        <div class="scoreRow">
            <label class="exclude-label"><input type="checkbox" id="exB">광</label>
            <input type="number" id="scoreB" placeholder="0" onfocus="this.select()">
            <button class="minusBtn" onclick="addMinus('scoreB')">+/-</button>
        </div>
        <div class="scoreRow">
            <label class="exclude-label"><input type="checkbox" id="exC">광</label>
            <input type="number" id="scoreC" placeholder="0" onfocus="this.select()">
            <button class="minusBtn" onclick="addMinus('scoreC')">+/-</button>
        </div>
        <div class="scoreRow">
            <label class="exclude-label"><input type="checkbox" id="exD">광</label>
            <input type="number" id="scoreD" placeholder="0" onfocus="this.select()">
            <button class="minusBtn" onclick="addMinus('scoreD')">+/-</button>
        </div>
        <button class="mainBtn addBtn" onclick="addRound()">판 저장</button>
        <button class="mainBtn undoBtn" onclick="undoLast()">↩ 마지막 판 취소</button>
    </div>

    <div class="card">
        <b>🏆 누적 순위 및 정산</b>
        <div id="ranking"></div>
        <button class="copyBtn" onclick="copyResult()">결과 복사</button>
        <div id="result">정산 내역 없음</div>
    </div>

    <button class="mainBtn resetBtn" onclick="resetGame()">전체 초기화</button>
</div>

<script>
    let rounds = []; 

    window.onload = loadGame;

    function saveGame() { localStorage.setItem("gostop_v4", JSON.stringify(rounds)); }

    function loadGame() {
        let data = localStorage.getItem("gostop_v4");
        if (data) { rounds = JSON.parse(data); calculate(); }
    }

    function addMinus(id) {
        let input = document.getElementById(id);
        let val = parseInt(input.value) || 0;
        if (val !== 0) input.value = val * -1;
    }

    function getNames() {
        return [
            document.getElementById("nameA").value || "A",
            document.getElementById("nameB").value || "B",
            document.getElementById("nameC").value || "C",
            document.getElementById("nameD").value || "D"
        ];
    }

    function addRound() {
        let scores = [
            parseInt(document.getElementById("scoreA").value) || 0,
            parseInt(document.getElementById("scoreB").value) || 0,
            parseInt(document.getElementById("scoreC").value) || 0,
            parseInt(document.getElementById("scoreD").value) || 0
        ];
        
        let excluded = [
            document.getElementById("exA").checked,
            document.getElementById("exB").checked,
            document.getElementById("exC").checked,
            document.getElementById("exD").checked
        ];

        excluded.forEach((isEx, i) => { if(isEx) scores[i] = 0; });
        rounds.push({ scores, excluded });

        ["scoreA", "scoreB", "scoreC", "scoreD"].forEach(id => document.getElementById(id).value = "");
        ["exA", "exB", "exC", "exD"].forEach(id => document.getElementById(id).checked = false);

        calculate();
        saveGame();
    }

    function undoLast() {
        if (rounds.length === 0 || !confirm("취소하시겠습니까?")) return;
        rounds.pop();
        calculate();
        saveGame();
    }

    function calculate() {
        let names = getNames();
        let totalScores = [0, 0, 0, 0];
        let pairDebts = Array.from(Array(4), () => Array(4).fill(0));

        rounds.forEach(round => {
            let s = round.scores;
            let ex = round.excluded;
            for(let i=0; i<4; i++) totalScores[i] += s[i];

            for (let i = 0; i < 4; i++) {
                for (let j = i + 1; j < 4; j++) {
                    if (ex[i] || ex[j]) continue; 
                    let diff = s[i] - s[j];
                    if (diff > 0) pairDebts[j][i] += diff; 
                    else if (diff < 0) pairDebts[i][j] += Math.abs(diff);
                }
            }
        });

        let players = names.map((n, i) => ({ name: n, score: totalScores[i] }));
        let sorted = [...players].sort((a, b) => b.score - a.score);
        document.getElementById("ranking").innerHTML = sorted.map((p, i) => 
            `${i+1}등: <span class="${i==0 && p.score>0 ? 'winner' : ''}">${p.name} (${p.score.toLocaleString()})</span>`
        ).join("<br>");

        let finalResults = [];
        for (let i = 0; i < 4; i++) {
            for (let j = i + 1; j < 4; j++) {
                let net = pairDebts[i][j] - pairDebts[j][i];
                if (net > 0) finalResults.push(`${names[i]} ⮕ ${names[j]} : ${net.toLocaleString()}점`);
                else if (net < 0) finalResults.push(`${names[j]} ⮕ ${names[i]} : ${Math.abs(net).toLocaleString()}점`);
            }
        }
        document.getElementById("result").innerHTML = finalResults.join("<br>") || "내역 없음";
    }

    function copyResult() {
        const text = document.getElementById("result").innerText;
        navigator.clipboard.writeText("💰 정산 결과 💰\n" + text).then(() => alert("복사되었습니다."));
    }

    function resetGame() {
        if (confirm("초기화할까요?")) { rounds = []; localStorage.removeItem("gostop_v4"); calculate(); }
    }
</script>
</body>
</html>
