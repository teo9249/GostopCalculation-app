<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3c72">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-touch-icon" content="icon-192.png">
    <title>고스톱 정산 Master Pro</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #28a745; --danger: #dc3545; --warning: #ffc107; --purple: #6610f2; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); margin:0; padding:10px; color:white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 500px; padding-bottom: 30px; }
        .card { background:white; color:#333; padding:15px; border-radius:15px; margin-bottom:15px; box-shadow:0 8px 20px rgba(0,0,0,0.3); }
        .name-section { display: flex; justify-content: space-between; gap: 5px; }
        .nameInput { width: 22%; padding:10px 5px; border-radius:8px; border:1px solid #ddd; text-align:center; font-weight: bold; font-size: 14px; outline: none; }
        
        /* 광 정산 전용 스타일 */
        .kwang-box { display: flex; align-items: center; justify-content: space-between; background: #f8f0ff; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e0cffc; }
        .kwang-sel { padding: 5px; border-radius: 5px; border: 1px solid var(--purple); font-weight: bold; }
        .kwang-btn-sm { background: var(--purple); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .player-row { border-bottom: 1px solid #eee; padding: 12px 0; }
        .row-main { display: flex; align-items: center; gap: 10px; }
        .role-radio { transform: scale(1.4); cursor: pointer; }
        .player-name-label { width: 70px; font-weight: bold; font-size: 15px; color: #333; overflow: hidden; }
        .score-input { width: 90px; padding: 10px; border-radius: 10px; border: 2.5px solid var(--accent); text-align: center; font-size: 18px; font-weight: bold; }
        .score-input:disabled { opacity: 0; pointer-events: none; }
        
        .row-options { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; padding-left: 25px; }
        .opt-btn { font-size: 11px; padding: 6px 8px; border-radius: 6px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
        .opt-btn.active { background: #ff4d4d; color: white; border-color: #ff4d4d; }
        .opt-btn.exclude-btn.active { background: #6c757d; color: white; }

        .mainBtn { width:100%; padding:15px; margin-top:8px; border:none; border-radius:12px; font-size:16px; font-weight:bold; cursor: pointer; }
        .addBtn { background: var(--accent); color:white; }
        .undoBtn { background: var(--warning); color: #333; }
        .resetBtn { background: var(--danger); color:white; margin-top: 20px; font-size: 13px; opacity: 0.8; }

        #result { white-space:pre-line; font-weight:bold; color: var(--secondary); line-height: 1.6; border-top: 1px solid #eee; padding-top: 10px; font-size: 15px; }
        #ranking { line-height: 1.8; margin-bottom: 10px; font-size: 14px; }
        .history-list { font-size: 12px; color: #555; max-height: 150px; overflow-y: auto; border-top: 1px solid #eee; margin-top: 10px; }
        .history-item { padding: 5px 0; border-bottom: 1px dashed #ddd; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="name-section">
            <input class="nameInput" id="name0" value="플레이어1" oninput="syncNames()">
            <input class="nameInput" id="name1" value="플레이어2" oninput="syncNames()">
            <input class="nameInput" id="name2" value="플레이어3" oninput="syncNames()">
            <input class="nameInput" id="name3" value="플레이어4" oninput="syncNames()">
        </div>
    </div>

    <div class="card" style="border: 2px solid var(--purple);">
        <div style="font-weight: bold; font-size: 14px; color: var(--purple); margin-bottom: 8px;">📢 판 시작 전: 광팔기 정산 (1개당 1점)</div>
        <div class="kwang-box">
            <select id="kwangPlayer" class="kwang-sel"></select>
            <select id="kwangCount" class="kwang-sel">
                <option value="1">광 1개 (1점)</option>
                <option value="2">광 2개 (2점)</option>
                <option value="3">광 3개 (3점)</option>
                <option value="4">광 4개 (4점)</option>
                <option value="5">광 5개 (5점)</option>
            </select>
            <button class="kwang-btn-sm" onclick="addKwangRound()">광값 저장</button>
        </div>
    </div>

    <div class="card">
        <div style="font-weight: bold; font-size: 14px; margin-bottom: 8px;">📝 판 결과 입력</div>
        <div id="playerRows"></div>
        <button class="mainBtn addBtn" onclick="addRound()">이번 판 저장</button>
        <button class="mainBtn undoBtn" onclick="undoLast()">↩ 마지막 취소</button>
    </div>

    <div class="card">
        <div style="font-weight: bold; font-size: 14px; margin-bottom: 8px;">🏆 누적 정산 현황</div>
        <div id="ranking"></div>
        <div id="result">내역 없음</div>
        <div id="history" class="history-list"></div>
    </div>

    <button class="mainBtn resetBtn" onclick="resetGame()">전체 초기화</button>
</div>

<script>
    let rounds = [];
    let winnerIdx = 0;
    let excludes = [false, false, false, false];

    window.onload = () => { buildRows(); loadGame(); syncNames(); };

    function syncNames() {
        const sel = document.getElementById('kwangPlayer');
        sel.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            const name = document.getElementById(`name${i}`).value || `P${i+1}`;
            const label = document.getElementById(`label${i}`);
            if(label) label.innerText = name;
            sel.innerHTML += `<option value="${i}">${name}</option>`;
        }
        render();
    }

    function buildRows() {
        const container = document.getElementById('playerRows');
        container.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            container.innerHTML += `
                <div class="player-row">
                    <div class="row-main">
                        <input type="radio" name="winGroup" class="role-radio" id="radio${i}" ${i==0?'checked':''} onclick="changeWinner(${i})">
                        <span class="player-name-label" id="label${i}"></span>
                        <input type="number" id="input${i}" class="score-input" placeholder="0" ${i!==0?'disabled':''}>
                    </div>
                    <div class="row-options" id="options${i}">
                        <button class="opt-btn exclude-btn" id="ex${i}" onclick="toggleEx(${i})">휴식</button>
                        <button class="opt-btn pak-btn" onclick="this.classList.toggle('active')">피박</button>
                        <button class="opt-btn pak-btn" onclick="this.classList.toggle('active')">광박</button>
                        <button class="opt-btn pak-btn" onclick="this.classList.toggle('active')">멍박</button>
                        <button class="opt-btn pak-btn" onclick="this.classList.toggle('active')">추가x2</button>
                    </div>
                </div>`;
        }
    }

    function changeWinner(idx) {
        winnerIdx = idx;
        for (let i = 0; i < 4; i++) {
            document.getElementById(`input${i}`).disabled = (i !== idx);
            document.getElementById(`options${i}`).style.opacity = (i === idx) ? '0' : '1';
        }
    }

    function toggleEx(idx) {
        excludes[idx] = !excludes[idx];
        document.getElementById(`ex${idx}`).classList.toggle('active');
    }

    function addKwangRound() {
        const kIdx = parseInt(document.getElementById('kwangPlayer').value);
        const kCount = parseInt(document.getElementById('kwangCount').value);
        // 광 1개당 1점 반영
        const amount = kCount * 1; 
        let scores = [-amount, -amount, -amount, -amount];
        scores[kIdx] = amount * 3;

        rounds.push({
            type: 'KWANG',
            scores: scores,
            desc: `${getName(kIdx)} 광 ${kCount}개 정산 (+${amount * 3})`
        });
        saveAndRender();
    }

    function addRound() {
        const scoreVal = parseInt(document.getElementById(`input${winnerIdx}`).value) || 0;
        if (scoreVal <= 0) return alert("점수를 입력하세요.");
        
        let scores = [0, 0, 0, 0];
        let winSum = 0;
        for (let i = 0; i < 4; i++) {
            if (i === winnerIdx || excludes[i]) continue;
            let m = 1;
            document.querySelectorAll(`#options${i} .pak-btn.active`).forEach(() => m *= 2);
            let loss = scoreVal * m;
            scores[i] = -loss;
            winSum += loss;
        }
        scores[winnerIdx] = winSum;

        rounds.push({
            type: 'GAME',
            scores: scores,
            desc: `${getName(winnerIdx)} ${scoreVal}점 승 (+${winSum})`
        });
        
        document.getElementById(`input${winnerIdx}`).value = '';
        excludes = [false, false, false, false];
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        saveAndRender();
    }

    function getName(i) { return document.getElementById(`name${i}`).value || `P${i+1}`; }

    function saveAndRender() {
        localStorage.setItem("gostop_vStep_Final", JSON.stringify(rounds));
        render();
    }

    function render() {
        let totals = [0,0,0,0];
        let historyHtml = "";
        rounds.forEach((r, idx) => {
            r.scores.forEach((s, i) => totals[i] += s);
            historyHtml = `<div class="history-item"><b>${r.type==='KWANG'?'[광]':'['+(idx+1)+']'}</b> ${r.desc}</div>` + historyHtml;
        });

        document.getElementById('ranking').innerHTML = [0,1,2,3].map(i => `${getName(i)}: <b>${totals[i].toLocaleString()}</b>`).join(' | ');
        document.getElementById('history').innerHTML = historyHtml;

        let final = [];
        let t = [...totals];
        for(let i=0; i<4; i++){
            if(t[i]>=0) continue;
            for(let j=0; j<4; j++){
                if(t[j]<=0) continue;
                let move = Math.min(Math.abs(t[i]), t[j]);
                if(move>0){
                    final.push(`${getName(i)} ⮕ ${getName(j)} : ${move.toLocaleString()}점`);
                    t[i]+=move; t[j]-=move;
                }
            }
        }
        document.getElementById('result').innerHTML = final.join('<br>') || "정산 내역 없음";
    }

    function undoLast() { if(confirm("취소할까요?")) { rounds.pop(); saveAndRender(); } }
    function resetGame() { if(confirm("초기화할까요?")) { localStorage.clear(); location.reload(); } }
    function loadGame() {
        const data = localStorage.getItem("gostop_vStep_Final");
        if(data) { rounds = JSON.parse(data); render(); }
    }
</script>
</body>
</html>
