<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>고스톱 정산 Master - Premium</title>
    <style>
        :root { 
            --bg-color: #0a2e1a; /* 짙은 화투판 초록색 */
            --card-bg: #ffffff;
            --primary-red: #d32f2f; /* 화투 뒷면 레드 */
            --gold: #fbc02d; /* 승자의 황금색 */
            --text-dark: #333;
            --gray: #f4f4f4;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--bg-color);
            margin: 0; padding: 15px; color: white;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 480px; }

        /* 헤더 디자인 */
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 1.6rem; color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

        /* 카드 공통 스타일 */
        .card { 
            background: var(--card-bg); color: var(--text-dark); 
            padding: 20px; border-radius: 20px; margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* 이름 입력 섹션 */
        .name-section { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .nameInput { 
            width: 100%; padding: 12px 5px; border-radius: 12px; border: 2px solid var(--gray);
            text-align: center; font-weight: 800; font-size: 0.9rem; box-sizing: border-box;
        }
        .nameInput:focus { border-color: var(--primary-red); outline: none; background: #fff5f5; }

        /* 플레이어 행 디자인 */
        .player-row { 
            background: #f9f9f9; border-radius: 15px; padding: 15px; margin-bottom: 12px;
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .player-row.winner-active { border-color: var(--gold); background: #fffdeb; }
        .player-row.is-excluded { opacity: 0.5; background: #eee; }

        .row-main { display: flex; align-items: center; justify-content: space-between; }
        .player-info { display: flex; align-items: center; gap: 12px; }
        
        .role-radio { width: 22px; height: 22px; accent-color: var(--primary-red); cursor: pointer; }
        .player-name-label { font-size: 1.1rem; font-weight: 700; color: #444; }

        .score-input { 
            width: 100px; padding: 10px; border-radius: 12px; border: 3px solid var(--primary-red);
            text-align: center; font-size: 1.4rem; font-weight: 900; color: var(--primary-red);
        }
        .score-input:disabled { display: none; }

        /* 옵션 버튼들 */
        .row-options { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .opt-btn { 
            padding: 8px 12px; border-radius: 10px; border: 1.5px solid #ddd; 
            background: white; font-size: 0.8rem; font-weight: 600; cursor: pointer;
        }
        .opt-btn.active { background: var(--primary-red); color: white; border-color: var(--primary-red); }
        .opt-btn.exclude-btn.active { background: #555; color: white; }

        /* 메인 버튼 */
        .mainBtn { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; 
            font-size: 1.1rem; font-weight: 800; cursor: pointer; margin-top: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: 0.1s;
        }
        .mainBtn:active { transform: translateY(3px); box-shadow: none; }
        .addBtn { background: var(--primary-red); color: white; }
        .undoBtn { background: #eee; color: #555; font-size: 0.9rem; }

        /* 결과 창 */
        #ranking { font-weight: 700; margin-bottom: 15px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        #result { font-size: 1.1rem; line-height: 1.8; color: var(--primary-red); }

        /* 안내 문구 */
        .sub-guide { font-size: 0.8rem; color: #888; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🎴 정산 Master Premium</h2>
    </div>

    <div class="card">
        <div class="name-section">
            <input class="nameInput" id="name0" value="플레이어1" oninput="syncNames()">
            <input class="nameInput" id="name1" value="플레이어2" oninput="syncNames()">
            <input class="nameInput" id="name2" value="플레이어3" oninput="syncNames()">
            <input class="nameInput" id="name3" value="플레이어4" oninput="syncNames()">
        </div>
    </div>

    <div class="card">
        <span class="sub-guide">💡 승자를 먼저 체크하고 점수를 적으세요.</span>
        <div id="playerRows"></div>
        <button class="mainBtn addBtn" onclick="addRound()">이번 판 정산 기록</button>
        <button class="mainBtn undoBtn" onclick="undoLast()">↩ 마지막 입력 취소</button>
    </div>

    <div class="card">
        <div id="ranking">준비됨</div>
        <div id="result">아직 기록이 없습니다.</div>
    </div>

    <button onclick="resetGame()" style="background:none; border:none; color:rgba(255,255,255,0.4); cursor:pointer; text-decoration:underline; font-size:0.8rem; margin-top:20px;">데이터 전체 초기화</button>
</div>

<script>
    // 기존 스크립트 로직 동일하게 유지 (UI 업데이트 반영)
    let rounds = []; 
    let winnerIdx = 0;
    let excludes = [false, false, false, false];

    window.onload = () => { buildRows(); loadGame(); syncNames(); };

    function buildRows() {
        const container = document.getElementById('playerRows');
        container.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            container.innerHTML += `
                <div class="player-row" id="row${i}">
                    <div class="row-main">
                        <div class="player-info">
                            <input type="radio" name="winGroup" class="role-radio" id="radio${i}" ${i==0?'checked':''} onclick="changeWinner(${i})">
                            <span class="player-name-label" id="label${i}"></span>
                        </div>
                        <input type="number" id="input${i}" class="score-input" placeholder="0" ${i!==0?'disabled':''}>
                    </div>
                    <div class="row-options" id="options${i}">
                        <button class="opt-btn exclude-btn" id="ex${i}" onclick="toggleEx(${i})">휴식</button>
                        <button class="opt-btn pak-btn" onclick="toggleActive(this)">피박</button>
                        <button class="opt-btn pak-btn" onclick="toggleActive(this)">광박</button>
                        <button class="opt-btn pak-btn" onclick="toggleActive(this)">멍박</button>
                        <button class="opt-btn pak-btn" onclick="toggleActive(this)">고/흔듦</button>
                        <button class="opt-btn pak-btn" onclick="toggleActive(this)">추가x2</button>
                    </div>
                </div>`;
        }
        changeWinner(0);
    }

    function toggleActive(btn) { btn.classList.toggle('active'); }

    function syncNames() {
        for (let i = 0; i < 4; i++) {
            document.getElementById(`label${i}`).innerText = document.getElementById(`name${i}`).value || `P${i+1}`;
        }
        render();
    }

    function changeWinner(idx) {
        winnerIdx = idx;
        for (let i = 0; i < 4; i++) {
            const isWin = (i === idx);
            const row = document.getElementById(`row${i}`);
            const input = document.getElementById(`input${i}`);
            const opts = document.getElementById(`options${i}`);
            
            row.classList.toggle('winner-active', isWin);
            input.disabled = !isWin;
            opts.style.display = isWin ? 'none' : 'flex';
        }
    }

    function toggleEx(idx) {
        excludes[idx] = !excludes[idx];
        const row = document.getElementById(`row${idx}`);
        const exBtn = document.getElementById(`ex${idx}`);
        row.classList.toggle('is-excluded', excludes[idx]);
        exBtn.classList.toggle('active', excludes[idx]);
        
        const otherBtns = document.querySelectorAll(`#options${idx} .pak-btn`);
        otherBtns.forEach(btn => {
            btn.disabled = excludes[idx];
            if(excludes[idx]) btn.classList.remove('active');
        });
    }

    function addRound() {
        const val = parseInt(document.getElementById(`input${winnerIdx}`).value) || 0;
        if (val <= 0) return alert("점수를 입력하세요!");
        
        let scores = [0, 0, 0, 0];
        let winSum = 0;

        for (let i = 0; i < 4; i++) {
            if (i === winnerIdx || excludes[i]) continue;
            let m = 1;
            document.querySelectorAll(`#options${i} .pak-btn.active`).forEach(() => m *= 2);
            let loss = val * m;
            scores[i] = -loss;
            winSum += loss;
        }
        scores[winnerIdx] = winSum;
        rounds.push({ scores, winName: document.getElementById(`name${winnerIdx}`).value, winVal: val });
        
        resetUI();
        saveGame();
        render();
    }

    function resetUI() {
        document.getElementById(`input${winnerIdx}`).value = '';
        excludes = [false, false, false, false];
        document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.player-row').forEach(r => r.classList.remove('is-excluded'));
        changeWinner(winnerIdx);
    }

    function render() {
        let totals = [0,0,0,0];
        rounds.forEach(r => r.scores.forEach((s, i) => totals[i] += s));
        
        const names = [0,1,2,3].map(i => document.getElementById(`name${i}`).value || `P${i+1}`);
        document.getElementById('ranking').innerHTML = names.map((n, i) => `${n}: <b>${totals[i]}</b>`).join(' | ');

        let final = [];
        let t = [...totals];
        for(let i=0; i<4; i++){
            if(t[i]>=0) continue;
            for(let j=0; j<4; j++){
                if(t[j]<=0) continue;
                let move = Math.min(Math.abs(t[i]), t[j]);
                if(move>0){
                    final.push(`💰 ${names[i]} ⮕ ${names[j]} : <b>${move}점</b>`);
                    t[i]+=move; t[j]-=move;
                }
            }
        }
        document.getElementById('result').innerHTML = final.join('<br>') || "판을 기록하면 정산 결과가 나옵니다.";
    }

    function saveGame() { localStorage.setItem("gostop_premium", JSON.stringify(rounds)); }
    function loadGame() {
        const data = localStorage.getItem("gostop_premium");
        if(data) { rounds = JSON.parse(data); render(); }
    }
    function undoLast() { if(confirm("마지막 판을 삭제할까요?")) { rounds.pop(); saveGame(); render(); } }
    function resetGame() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
